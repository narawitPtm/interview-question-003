<header class="masthead">
  <div class="masthead__id">
    <span class="masthead__code">IT 03-1</span>
    <span class="masthead__rule"></span>
  </div>
  <div class="masthead__meta">
    <h1>รายการอนุมัติเอกสาร</h1>
    <p>Document Approval Queue · example.com</p>
  </div>
  <div class="masthead__stats">
    <span class="stat stat--pending"><b>{{ counts().pending }}</b> รออนุมัติ</span>
    <span class="stat stat--approved"><b>{{ counts().approved }}</b> อนุมัติ</span>
    <span class="stat stat--rejected"><b>{{ counts().rejected }}</b> ไม่อนุมัติ</span>
  </div>
</header>
