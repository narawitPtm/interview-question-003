<div class="backdrop" (click)="close.emit()">
  <div class="modal" [class.modal--reject]="kind() === 'REJECT'" (click)="$event.stopPropagation()">
    <div class="modal__accent"></div>
    <div class="modal__body">
      <div class="modal__head">
        <div class="modal__icon">
          @if (kind() === 'APPROVE') {
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,9 6,13 14,4"></polyline>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="3" y1="3" x2="13" y2="13"></line>
              <line x1="13" y1="3" x2="3" y2="13"></line>
            </svg>
          }
        </div>
        <h2>{{ copy().title }}</h2>
        <span class="modal__code">{{ copy().code }}</span>
      </div>
      <p class="modal__sub">ดำเนินการกับ <strong>{{ selectedCount() }}</strong> รายการที่เลือก</p>
      <label class="field">
        <span class="field__label">เหตุผล</span>
        <textarea [ngModel]="reason()" (ngModelChange)="reason.set($event)" rows="3"
          placeholder="ระบุเหตุผลในการดำเนินการ..."></textarea>
      </label>
    </div>
    <div class="modal__actions">
      <button class="btn btn--ghost" (click)="close.emit()">ยกเลิก</button>
      <button class="btn" [class.btn--approve]="kind() === 'APPROVE'" [class.btn--reject]="kind() === 'REJECT'"
        (click)="onConfirm()">
        {{ copy().confirm }}
      </button>
    </div>
  </div>
</div>
