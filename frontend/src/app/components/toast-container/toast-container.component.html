<div class="toast-stack" role="region" aria-live="polite" aria-label="การแจ้งเตือน">
  @for (toast of toasts(); track toast.id) {
    <div
      class="toast"
      [class.toast--success]="toast.kind === 'success'"
      [class.toast--error]="toast.kind === 'error'"
      role="status"
    >
      <span class="toast__icon" aria-hidden="true">
        @if (toast.kind === 'success') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8.5L6.5 12L13 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        }
      </span>
      <span class="toast__msg">{{ toast.message }}</span>
      <button type="button" class="toast__close" (click)="dismiss(toast.id)" aria-label="ปิด">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="toast__bar" aria-hidden="true"></span>
    </div>
  }
</div>
