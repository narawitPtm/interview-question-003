<div class="page">
  <div class="ledger">
    <app-masthead />
    <app-filter-toolbar
      [selectedCount]="selectedCount()"
      (filterChange)="onFilterChange()"
      (openModal)="openModal($event)"
    />
    <app-document-table
      [selected]="selected()"
      (toggleRow)="toggleRow($event)"
      (toggleAll)="toggleAll()"
      (quickAction)="onQuickAction($event)"
    />
  </div>

  <app-toast-container />

  @if (modal(); as kind) {
    <app-confirm-modal
      [kind]="kind"
      [selectedCount]="selectedCount()"
      (close)="closeModal()"
      (confirm)="confirm($event)"
    />
  }
</div>
